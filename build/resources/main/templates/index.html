<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java Battle Arena</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, "Helvetica Neue", "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            overflow-x: hidden;
        }

        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 1.5rem 2rem;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.5rem;
            font-weight: 700;
            color: #ffffff;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: #6366f1;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .auth-buttons {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            border: none;
            font-size: 0.9rem;
            font-family: inherit;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff;
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .btn-primary {
            background: #6366f1;
            color: #ffffff;
        }

        .btn-primary:hover {
            background: #5856eb;
        }

        .main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
        }

        .hero {
            text-align: center;
            max-width: 800px;
            z-index: 2;
        }

        .hero h1 {
            font-size: 4rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            letter-spacing: -0.02em;
            line-height: 1.1;
        }

        .hero-subtitle {
            font-size: 1.25rem;
            color: #9ca3af;
            margin-bottom: 3rem;
            line-height: 1.6;
        }

        .hero-actions {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-large {
            padding: 1rem 2rem;
            font-size: 1.1rem;
        }

        .btn-success {
            background: #10b981;
            color: #ffffff;
        }

        .btn-success:hover {
            background: #059669;
        }

        .grid-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            opacity: 0.1;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .auth-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .auth-modal.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: #111111;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 2rem;
            width: 90%;
            max-width: 400px;
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .auth-modal.active .modal-content {
            transform: scale(1);
        }

        .modal-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #e5e5e5;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #ffffff;
            font-size: 1rem;
            font-family: inherit;
        }

        .form-input:focus {
            outline: none;
            border-color: #6366f1;
            background: rgba(255, 255, 255, 0.08);
        }

        .btn-full {
            width: 100%;
            margin-bottom: 1rem;
        }

        .modal-switch {
            text-align: center;
            color: #9ca3af;
        }

        .modal-switch a {
            color: #6366f1;
            text-decoration: none;
        }

        .modal-switch a:hover {
            text-decoration: underline;
        }

        .close-modal {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            color: #9ca3af;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.5rem;
        }

        .close-modal:hover {
            color: #ffffff;
        }

        .user-info {
            display: none;
            align-items: center;
            gap: 1rem;
        }

        .user-info.active {
            display: flex;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            background: #6366f1;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2.5rem;
            }
            
            .hero-actions {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <nav class="nav">
                <div class="logo">
                    <div class="logo-icon">⚔️</div>
                    <span>Java Battle Arena</span>
                </div>
                <div class="auth-buttons" id="authButtons">
                    <button class="btn btn-outline" onclick="openModal('login')">로그인</button>
                    <button class="btn btn-primary" onclick="openModal('register')">회원가입</button>
                </div>
                <div class="user-info" id="userInfo">
                    <div class="user-avatar" id="userAvatar">J</div>
                    <span id="userNickname">사용자</span>
                    <button class="btn btn-outline" onclick="logout()">로그아웃</button>
                </div>
            </nav>
        </header>

        <main class="main">
            <div class="grid-bg"></div>
            <div class="hero">
                <h1>코딩 실력을 겨뤄보세요</h1>
                <p class="hero-subtitle">
                    실시간 Java 코딩 배틀에서 전 세계 개발자들과 경쟁하며<br>
                    프로그래밍 실력을 향상시키세요
                </p>
                <div class="hero-actions">
                    <button class="btn btn-success btn-large" onclick="startBattle()">
                        ⚡ 바로 시작하기
                    </button>
                    <button class="btn btn-outline btn-large" onclick="showLeaderboard()">
                        🏆 순위표 보기
                    </button>
                </div>
            </div>
        </main>
    </div>

    <div class="auth-modal" id="authModal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal()">×</button>
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">로그인</h2>
                <p id="modalSubtitle">계정에 로그인하세요</p>
            </div>
            
            <form id="authForm">
                <div class="form-group">
                    <label class="form-label" for="email">이메일</label>
                    <input type="email" id="email" class="form-input" placeholder="your@email.com" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="password">비밀번호</label>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                </div>
                
                <div class="form-group" id="nicknameGroup" style="display: none;">
                    <label class="form-label" for="nickname">닉네임</label>
                    <input type="text" id="nickname" class="form-input" placeholder="닉네임을 입력하세요">
                </div>
                
                <div class="form-group" id="confirmPasswordGroup" style="display: none;">
                    <label class="form-label" for="confirmPassword">비밀번호 확인</label>
                    <input type="password" id="confirmPassword" class="form-input" placeholder="••••••••">
                </div>
                
                <button type="submit" class="btn btn-primary btn-full">
                    <span id="submitText">로그인</span>
                </button>
            </form>
            
            <p class="modal-switch">
                <span id="switchText">계정이 없으신가요?</span>
                <a href="#" onclick="switchMode()" id="switchLink">회원가입</a>
            </p>
        </div>
    </div>

    <script>
        let isLoginMode = true;
        let authToken = localStorage.getItem('auth_token');

        document.addEventListener('DOMContentLoaded', function() {
            if (authToken) {
                checkAuthStatus();
            }
        });

        function openModal(mode) {
            const modal = document.getElementById('authModal');
            modal.classList.add('active');
            
            if (mode === 'register') {
                switchToRegister();
            } else {
                switchToLogin();
            }
        }

        function closeModal() {
            const modal = document.getElementById('authModal');
            modal.classList.remove('active');
            clearForm();
        }

        function switchMode() {
            if (isLoginMode) {
                switchToRegister();
            } else {
                switchToLogin();
            }
        }

        function switchToLogin() {
            isLoginMode = true;
            document.getElementById('modalTitle').textContent = '로그인';
            document.getElementById('modalSubtitle').textContent = '계정에 로그인하세요';
            document.getElementById('submitText').textContent = '로그인';
            document.getElementById('switchText').textContent = '계정이 없으신가요?';
            document.getElementById('switchLink').textContent = '회원가입';
            document.getElementById('nicknameGroup').style.display = 'none';
            document.getElementById('confirmPasswordGroup').style.display = 'none';
        }

        function switchToRegister() {
            isLoginMode = false;
            document.getElementById('modalTitle').textContent = '회원가입';
            document.getElementById('modalSubtitle').textContent = '새 계정을 만드세요';
            document.getElementById('submitText').textContent = '회원가입';
            document.getElementById('switchText').textContent = '이미 계정이 있으신가요?';
            document.getElementById('switchLink').textContent = '로그인';
            document.getElementById('nicknameGroup').style.display = 'block';
            document.getElementById('confirmPasswordGroup').style.display = 'block';
        }

        function clearForm() {
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
            document.getElementById('nickname').value = '';
            document.getElementById('confirmPassword').value = '';
        }

        async function checkAuthStatus() {
            try {
                const response = await fetch('/api/user/profile', {
                    headers: {
                        'Authorization': 'Bearer ' + authToken,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    const user = await response.json();
                    showUserInfo(user);
                } else {
                    localStorage.removeItem('auth_token');
                    authToken = null;
                }
            } catch (error) {
                console.error('Auth check failed:', error);
                localStorage.removeItem('auth_token');
                authToken = null;
            }
        }

        function showUserInfo(user) {
            document.getElementById('authButtons').style.display = 'none';
            document.getElementById('userInfo').classList.add('active');
            document.getElementById('userNickname').textContent = user.nickname;
            document.getElementById('userAvatar').textContent = user.nickname.charAt(0).toUpperCase();
        }

        function logout() {
            localStorage.removeItem('auth_token');
            authToken = null;
            document.getElementById('authButtons').style.display = 'flex';
            document.getElementById('userInfo').classList.remove('active');
        }

        function startBattle() {
            if (!authToken) {
                alert('로그인 후 이용할 수 있습니다!');
                openModal('login');
                return;
            }
            window.location.href = '/arena';
        }

        function showLeaderboard() {
            alert('리더보드 기능을 준비 중입니다!');
        }

        document.getElementById('authForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const nickname = document.getElementById('nickname').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (!isLoginMode) {
                if (password !== confirmPassword) {
                    alert('비밀번호가 일치하지 않습니다!');
                    return;
                }
                if (!nickname.trim()) {
                    alert('닉네임을 입력해주세요!');
                    return;
                }
            }
            
            const url = isLoginMode ? '/api/auth/login' : '/api/auth/register';
            const body = isLoginMode ? 
                { email, password } : 
                { email, password, nickname };
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(body)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    if (isLoginMode) {
                        authToken = data.token;
                        localStorage.setItem('auth_token', authToken);
                        showUserInfo(data);
                        closeModal();
                        alert(`환영합니다, ${data.nickname}님!`);
                    } else {
                        alert(data.message);
                        switchToLogin();
                        clearForm();
                    }
                } else {
                    alert(data.message || '오류가 발생했습니다.');
                }
                
            } catch (error) {
                console.error('Request failed:', error);
                alert('서버와 통신 중 오류가 발생했습니다.');
            }
        });

        window.addEventListener('click', function(e) {
            const modal = document.getElementById('authModal');
            if (e.target === modal) {
                closeModal();
            }
        });
    </script>
</body>
</html>
